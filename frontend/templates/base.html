<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="sidebar-inner">
        <a class="brand" href="/">
          <span class="brand-mark">MT</span>
          <span>
            <div class="brand-title">Mash Terminal</div>
            <div class="brand-subtitle">Research and trading control layer</div>
          </span>
        </a>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link{% if active_page == 'home' %} active{% endif %}" href="/">Home</a>
          <a class="nav-link{% if active_page == 'command-center' %} active{% endif %}" href="/command-center">Command Center</a>
          <a class="nav-link{% if active_page == 'market' %} active{% endif %}" href="/market">Market</a>
          <a class="nav-link{% if active_page == 'strategy-lab' %} active{% endif %}" href="/strategy-lab">Strategy Lab</a>
        </nav>
      </div>
    </aside>

    <div class="main">
      <div class="page">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  {% block page_script %}{% endblock %}
</body>
</html>
